<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command Central</title>
<style>
:root{--paper:#f4f1ea;--card:#fbfaf6;--ink:#26221c;--soft:#6b6459;--hair:#e3ddd0;--hair2:#ece7db;--accent:#5b7355;--accent2:#3f5340;--idle:#8a8172;--work:#c0892d;--block:#b0503c;--needs:#a8642a;--mono:ui-monospace,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
@media(prefers-color-scheme:dark){:root{--paper:#1a1714;--card:#221e1a;--ink:#efe9dd;--soft:#a89f8f;--hair:#332d26;--hair2:#2a251f;--accent:#8faa86;--accent2:#a7c09e;--work:#d6a545;--block:#d06a54;--needs:#d98a4e}}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 70px}
.mast{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.brand{display:flex;align-items:center;gap:11px}.dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 18%,transparent)}
h1{font-size:1.5rem;margin:0;letter-spacing:-.02em;font-weight:650}.sub{color:var(--soft);font-size:.88rem}
.upd{font-family:var(--mono);font-size:.75rem;color:var(--soft)}.upd b{color:var(--ink)}
.cols{display:grid;grid-template-columns:1fr 340px;gap:18px;margin-top:18px}@media(max-width:900px){.cols{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--hair);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 6px 20px rgba(38,34,28,.05);overflow:hidden}
.ph{padding:13px 16px;border-bottom:1px solid var(--hair2);display:flex;align-items:center;justify-content:space-between;gap:8px}
.tag{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent2);font-weight:600}
.needbar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 2px}
.chip{font-family:var(--mono);font-size:.74rem;padding:6px 11px;border-radius:20px;background:var(--card);border:1px solid var(--hair)}
.chip b{color:var(--needs)}
.thread{padding:14px 16px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%;padding:9px 13px;border-radius:13px;font-size:.9rem;white-space:pre-wrap;word-wrap:break-word}
.msg.cos{align-self:flex-start;background:color-mix(in srgb,var(--accent) 14%,transparent);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);border-bottom-left-radius:4px}
.msg.shelley{align-self:flex-end;background:var(--hair2);border-bottom-right-radius:4px}
.msg .who{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);margin-bottom:3px}
.composer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--hair2)}
textarea{font-family:var(--sans);font-size:.9rem;width:100%;resize:vertical;border:1px solid var(--hair);border-radius:9px;padding:9px 11px;background:var(--paper);color:var(--ink);min-height:42px}
textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
button{font-family:var(--sans);font-weight:600;font-size:.86rem;padding:9px 15px;border-radius:9px;border:0;background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap}
button:hover{background:var(--accent2)}button.ghost{background:transparent;color:var(--accent2);border:1px solid var(--hair)}
.hint{padding:0 16px 12px;font-size:.76rem;color:var(--soft)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:16px}
.dir{background:var(--card);border:1px solid var(--hair);border-radius:13px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.stripe{height:3px;background:var(--idle)}.dir[data-s=working] .stripe{background:var(--work)}.dir[data-s=blocked] .stripe{background:var(--block)}.dir[data-s=idle] .stripe{background:var(--accent);opacity:.5}
.dh{padding:13px 15px 4px;display:flex;align-items:center;justify-content:space-between}.dname{font-weight:640}
.pill{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding:3px 9px;border-radius:20px}
.pill.idle{color:var(--idle);background:color-mix(in srgb,var(--idle) 14%,transparent)}.pill.working{color:var(--work);background:color-mix(in srgb,var(--work) 15%,transparent)}.pill.blocked{color:var(--block);background:color-mix(in srgb,var(--block) 15%,transparent)}
.db{padding:2px 15px 14px;display:flex;flex-direction:column;gap:9px}.hl{font-size:.9rem}
.ni{font-size:.82rem;display:flex;gap:8px;padding:5px 0;border-top:1px solid var(--hair2)}
.ni:first-child{border-top:0}.k{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;padding:2px 6px;border-radius:5px;font-weight:600;height:fit-content}
.k.send{background:color-mix(in srgb,var(--needs) 15%,transparent);color:var(--needs)}.k.decision{background:color-mix(in srgb,var(--work) 16%,transparent);color:var(--work)}
.notewrap{padding:10px 15px 14px;border-top:1px solid var(--hair2);background:color-mix(in srgb,var(--paper) 45%,transparent)}
.notewrap label{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--soft)}
.noterow{display:flex;gap:7px;margin-top:6px;align-items:flex-start}
.near{padding:11px 16px;border-top:1px solid var(--hair2)}.near:first-child{border-top:0}
.gk{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent2);font-weight:600}
.nlist{list-style:none;margin:6px 0 0;padding:0}.nlist li{font-size:.85rem;padding:4px 0 4px 14px;position:relative}
.nlist li:before{content:"";position:absolute;left:0;top:11px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.nlist li.ndone{text-decoration:line-through;color:var(--soft)}.nlist li.ndone:before{opacity:.4}
/* goals outliner */
.goalsec{margin-top:26px}.gmast{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:4px}
.ghelp{font-size:.76rem;color:var(--soft);margin:0 0 14px}
.horizon{background:var(--card);border:1px solid var(--hair);border-radius:13px;padding:14px 18px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.hh{display:flex;align-items:center;gap:10px;margin-bottom:6px}.hlabel{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent2);font-weight:600}
.hcount{margin-left:auto;font-family:var(--mono);font-size:.66rem;color:var(--soft)}
.gitem{}
.grow{display:flex;align-items:flex-start;gap:9px;padding:3px 6px;border-radius:7px;margin-left:-6px}
.grow:hover{background:color-mix(in srgb,var(--accent) 6%,transparent)}
.gchk{margin-top:3px;width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex:none}
.gtext{flex:1;font-size:.9rem;outline:none;padding:2px 5px;border-radius:5px;min-width:40px}
.gtext.gtop{font-weight:600}
.gtext:focus{background:color-mix(in srgb,var(--accent) 10%,transparent);box-shadow:0 0 0 1px var(--accent)}
.gtext.done{text-decoration:line-through;color:var(--soft)}
.gkids{margin-left:24px;border-left:1px solid var(--hair2);padding-left:12px;margin-top:1px}
.due{font-family:var(--mono);font-size:.6rem;color:var(--needs);border:1px solid color-mix(in srgb,var(--needs) 30%,transparent);border-radius:5px;padding:1px 5px;margin-top:3px;white-space:nowrap;flex:none;height:fit-content}
.gctl{display:none;gap:3px;flex:none}
.grow:hover .gctl,.grow:focus-within .gctl{display:flex}
.gctl button{background:transparent;color:var(--soft);border:1px solid var(--hair);padding:1px 6px;font-size:.72rem;line-height:1.3;border-radius:5px;font-weight:500;min-width:22px}
.gctl button:hover{background:var(--hair2);color:var(--ink)}
.addtop{margin-top:9px;background:transparent;color:var(--accent2);border:1px dashed var(--hair);font-size:.78rem;padding:6px 12px;font-weight:500}
.addtop:hover{background:color-mix(in srgb,var(--accent) 8%,transparent)}
.savetag{font-family:var(--mono);font-size:.64rem;color:var(--accent);opacity:0;transition:opacity .2s}.savetag.on{opacity:1}
#login{max-width:380px;margin:14vh auto;text-align:center}#login .panel{padding:26px}#login h1{margin-bottom:6px}#login p{color:var(--soft);font-size:.9rem;margin:0 0 18px}
#login .row{display:flex;gap:8px;margin-top:12px}#lerr{color:var(--block);font-size:.82rem;min-height:18px;margin-top:8px}
.micbtn,.voicetog{background:transparent;border:1px solid var(--hair);color:var(--accent2);padding:0 13px;font-size:1.05rem;border-radius:9px;cursor:pointer;line-height:1}
.micbtn{flex:none}.micbtn:hover,.voicetog:hover{background:var(--hair2)}
.micbtn.listening{background:var(--block);color:#fff;border-color:transparent;animation:pulse 1s infinite}
.voicetog{padding:2px 9px;font-size:.95rem}.voicetog.on{background:color-mix(in srgb,var(--accent) 20%,transparent);border-color:transparent}
@keyframes pulse{50%{opacity:.5}}
.ni a{color:var(--accent2);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--accent2) 40%,transparent)}.ni a:hover{color:var(--accent)}
.metrics{margin:14px 0 2px}
.mtag{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);font-weight:600;margin-bottom:8px}
.mrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.mtile{background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ml{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--soft)}
.mv{font-size:1.35rem;font-weight:650;letter-spacing:-.02em;margin:2px 0;font-variant-numeric:tabular-nums}
.ms{font-size:.78rem;color:var(--soft)}
.hidden{display:none}
</style>
</head>
<body>
<div id="login"><div class="panel"><div class="brand" style="justify-content:center"><span class="dot"></span><h1>Command Central</h1></div><p>Big Self School — Chief of Staff</p><input id="lpass" type="password" placeholder="passphrase" style="width:100%;padding:11px;border-radius:9px;border:1px solid var(--hair);background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:.95rem" /><div class="row"><button id="lbtn" style="flex:1">Enter</button></div><div id="lerr"></div></div></div>
<div id="app" class="wrap hidden"></div>
<script>
var API = "https://frqqdorkjkamiwlyhmga.supabase.co/functions/v1/cos";
var pass = localStorage.getItem("cos_pass") || "";
var GOALS = { horizons: {} };
function esc(s){s=(s==null)?"":String(s);return s.replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]})}
function api(action,extra){var body={action:action,pass:pass};if(extra)for(var k in extra)body[k]=extra[k];return fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){if(r.status===401){var e=new Error("unauthorized");e.code=401;throw e}return r.json()})}
var L=document.getElementById("login"),A=document.getElementById("app");
function showLogin(){L.classList.remove("hidden");A.classList.add("hidden")}
document.getElementById("lbtn").onclick=function(){var p=document.getElementById("lpass").value;pass=p;api("state").then(function(d){localStorage.setItem("cos_pass",p);L.classList.add("hidden");A.classList.remove("hidden");render(d);startPoll()}).catch(function(){pass="";document.getElementById("lerr").textContent="That passphrase did not match. Try again."})};
document.getElementById("lpass").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("lbtn").click()});

function render(d){var b=d.board||{};var dirs=b.directors||[];GOALS=d.goals||{horizons:{}};if(!GOALS.horizons)GOALS.horizons={};
var send=0,dec=0,block=0;for(var i=0;i<dirs.length;i++){var ny=dirs[i].needsYou||[];for(var j=0;j<ny.length;j++){if(ny[j].type==="send")send++;else dec++}if(dirs[i].status==="blocked")block++}
var h="";
h+="<div class=mast><div class=brand><span class=dot></span><div><h1>Command Central</h1><div class=sub>7 Directors reporting to your Chief of Staff</div></div></div><div class=upd>updated <b>"+esc(b.updated||"-")+"</b><br>"+esc(b.lastRun||"")+"</div></div>";
h+="<div class=needbar><span class=chip><b>"+send+"</b> drafts to review</span><span class=chip><b>"+dec+"</b> decisions</span><span class=chip><b>"+block+"</b> blocked</span></div>";
h+=metricsHtml(b.metrics);
h+="<div class=cols><div>";
h+="<div class=panel><div class=ph><span class=tag>Talk to COS</span><button id=aloud class=voicetog title='Read COS replies aloud'>🔊 read aloud</button></div><div class=thread id=thread></div><div class=composer><button id=mic class=micbtn title='Hold a thought? Tap and speak'>🎤</button><textarea id=cin placeholder='Message COS — or tap 🎤 and talk. Approve a draft, reprioritize, ask a question...'></textarea><button id=csend>Send</button></div><div class=hint>Approve by talking to COS here (“post the LinkedIn draft”, “send email 6 Tuesday”). Voice works in Chrome.</div></div>";
h+="<div class=grid id=grid></div></div>";
h+="<div><div class=panel><div class=ph><span class=tag>Focus</span></div><div id=nearbody></div></div></div>";
h+="</div>";
h+="<div class=goalsec><div class=gmast><span class=tag>My goals — check off what you finish</span><span class=upd><span id=savetag class=savetag>saved</span> · from your coach focus board · "+esc(GOALS.exported_at||"")+"</span></div><p class=ghelp>Check the box when done · click text to edit · hover a line for ＋sub-item, ↑↓ reorder, → ← indent/outdent, ✕ delete. Saves automatically.</p><div id=ghorizons></div></div>";
A.innerHTML=h;
document.getElementById("grid").innerHTML=dirs.map(function(x){return cardHtml(x,(d.notes||{})[x.short]||"")}).join("");
renderThread(d.messages||[]);
document.getElementById("csend").onclick=sendMsg;
document.getElementById("cin").addEventListener("keydown",function(e){if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))sendMsg()});
bindNotes();
setupVoice();
window._msgBase=(d.messages||[]).length;
rerenderGoals();
attachGoalHandlers();}

/* ---- fleet cards ---- */
function cardHtml(x,note){var ny=(x.needsYou||[]).map(function(n){var what=n.link?("<a href='"+esc(n.link)+"' target=_blank rel=noopener>"+esc(n.what)+" ↗</a>"):esc(n.what);return "<div class=ni><span class='k "+esc(n.type)+"'>"+(n.type==="send"?"review":"decide")+"</span><span>"+what+"</span></div>"}).join("");
return "<div class=dir data-s="+esc(x.status)+"><div class=stripe></div><div class=dh><span class=dname>"+esc(x.name)+"</span><span class='pill "+esc(x.status)+"'>"+esc(x.status)+"</span></div><div class=db><div class=hl>"+esc(x.headline||"")+"</div>"+ny+"</div><div class=notewrap><label>Your notes for "+esc(x.name)+"</label><div class=noterow><textarea data-note="+esc(x.short)+" placeholder='jot a note or instruction...'>"+esc(note)+"</textarea><button class=ghost data-save="+esc(x.short)+">Save</button></div></div></div>"}
function bindNotes(){var btns=document.querySelectorAll("[data-save]");for(var i=0;i<btns.length;i++){btns[i].onclick=function(){var dir=this.getAttribute("data-save");var ta=document.querySelector("[data-note="+dir+"]");var self=this;self.textContent="Saving...";api("note",{director:dir,body:ta.value}).then(function(){self.textContent="Saved";setTimeout(function(){self.textContent="Save"},1400)})}}}

/* ---- thread ---- */
function renderThread(msgs){var t=document.getElementById("thread");if(!t)return;t.innerHTML=msgs.map(function(m){var who=m.role==="cos"?"COS":"You";return "<div class='msg "+esc(m.role)+"'><div class=who>"+who+"</div>"+esc(m.body)+"</div>"}).join("");t.scrollTop=t.scrollHeight}
function sendMsg(){var inp=document.getElementById("cin");var v=inp.value.trim();if(!v)return;inp.value="";var t=document.getElementById("thread");t.innerHTML+="<div class='msg shelley'><div class=who>You</div>"+esc(v)+"</div>";t.scrollTop=t.scrollHeight;api("message",{thread:"cos",body:v}).then(function(){})}
function startPoll(){setInterval(function(){api("state").then(function(d){var m=d.messages||[];if(!(document.activeElement&&document.activeElement.id==="cin"))renderThread(m);if(readAloudOn()&&m.length>(window._msgBase||0)){var last=m[m.length-1];if(last&&last.role==="cos")speak(last.body)}window._msgBase=m.length}).catch(function(){})},8000)}
/* ---- voice: speak to COS (speech-to-text) + hear COS (text-to-speech) ---- */
var _rec=null,_listening=false;
function setupVoice(){
  var mic=document.getElementById("mic"),aloud=document.getElementById("aloud");
  var Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(mic){
    if(!Rec){mic.style.display="none";}
    else{
      if(!_rec){_rec=new Rec();_rec.lang="en-US";_rec.interimResults=false;_rec.maxAlternatives=1;
        _rec.onresult=function(e){var t=e.results[0][0].transcript;var c=document.getElementById("cin");if(c)c.value=(c.value?c.value+" ":"")+t;};
        _rec.onend=function(){_listening=false;var b=document.getElementById("mic");if(b)b.classList.remove("listening");};
        _rec.onerror=function(){_listening=false;var b=document.getElementById("mic");if(b)b.classList.remove("listening");};
      }
      mic.onclick=function(){if(_listening){try{_rec.stop()}catch(e){}return;}try{_rec.start();_listening=true;mic.classList.add("listening");}catch(e){}};
    }
  }
  if(aloud){
    if(!("speechSynthesis" in window)){aloud.style.display="none";}
    else{if(localStorage.getItem("cos_aloud")==="1")aloud.classList.add("on");
      aloud.onclick=function(){aloud.classList.toggle("on");var on=aloud.classList.contains("on");localStorage.setItem("cos_aloud",on?"1":"0");if(!on&&window.speechSynthesis)window.speechSynthesis.cancel();};
    }
  }
}
function readAloudOn(){var a=document.getElementById("aloud");return a&&a.classList.contains("on")}
function speak(text){if(!("speechSynthesis" in window)||!text)return;var u=new SpeechSynthesisUtterance(String(text));u.rate=1.03;u.pitch=1;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}

/* ---- goals outliner ---- */
function newNode(){return {id:"g"+Date.now().toString(36)+Math.floor(Math.random()*1000),title:"New item",due:null,done:false,children:[]}}
function locate(id){var hz=GOALS.horizons||{};for(var k in hz){var r=locIn(hz[k],null,id);if(r)return r}return null}
function locIn(list,parent,id){for(var i=0;i<list.length;i++){if(list[i].id===id)return {list:list,i:i,parent:parent};if(list[i].children){var r=locIn(list[i].children,list[i],id);if(r)return r}}return null}
function count(list){var d=0,t=0;(function w(l){for(var i=0;i<l.length;i++){t++;if(l[i].done)d++;if(l[i].children)w(l[i].children)}})(list);return {done:d,total:t}}
function itemHtml(n,top){var due=n.due?"<span class=due>"+esc(n.due)+"</span>":"";var kids=(n.children&&n.children.length)?("<div class=gkids>"+n.children.map(function(c){return itemHtml(c,false)}).join("")+"</div>"):"";
return "<div class=gitem><div class=grow><input type=checkbox class=gchk data-id="+n.id+(n.done?" checked":"")+"><span class='gtext"+(n.done?" done":"")+(top?" gtop":"")+"' contenteditable=true data-id="+n.id+">"+esc(n.title)+"</span>"+due+"<span class=gctl><button data-act=child data-id="+n.id+" title='add sub-item'>+</button><button data-act=up data-id="+n.id+" title='move up'>&uarr;</button><button data-act=down data-id="+n.id+" title='move down'>&darr;</button><button data-act=indent data-id="+n.id+" title='indent'>&rarr;</button><button data-act=outdent data-id="+n.id+" title='outdent'>&larr;</button><button data-act=del data-id="+n.id+" title='delete'>&times;</button></span></div>"+kids+"</div>"}
function horizonsHtml(){var hz=GOALS.horizons||{};var order=[["annual","2026 — Annual"],["quarterly","Q3 — Quarterly"],["monthly","This month"],["weekly","This week"],["daily","Today"]];var h="";
for(var i=0;i<order.length;i++){var k=order[i][0];var list=hz[k];if(!list)continue;var c=count(list);h+="<div class=horizon><div class=hh><span class=hlabel>"+esc(order[i][1])+"</span><span class=hcount>"+c.done+"/"+c.total+" done</span></div>"+list.map(function(n){return itemHtml(n,true)}).join("")+"<button class=addtop data-h="+k+">+ add item</button></div>"}
if(!h)h="<div class=horizon><span class=sub>No goals loaded.</span></div>";return h}
function metricsHtml(m){if(!m)return "";var mc=m.mailchimp||{},bf=m.buffer||{},t=[];
if(mc.members!=null)t.push(["Email list",esc(mc.members)+" subs",(mc.avgOpenRate!=null?mc.avgOpenRate+"% avg open":"")]);
if(mc.lastCampaign)t.push(["Last email",esc(mc.lastCampaign.openRate)+"% open",esc(mc.lastCampaign.subject||"")]);
if(bf.reach!=null)t.push(["Social reach 30d",esc(bf.reach),(bf.engagement!=null?esc(bf.engagement)+" engagements":"")]);else t.push(["Social","—",esc(bf.note||"")]);
if(m.socialDrafts!=null)t.push(["In Buffer",esc(m.socialDrafts)+" drafts","waiting to schedule"]);
if(!t.length)return "";
return "<div class=metrics><div class=mtag>📊 Marketing · updated "+esc(m.updated||"")+"</div><div class=mrow>"+t.map(function(x){return "<div class=mtile><div class=ml>"+esc(x[0])+"</div><div class=mv>"+esc(x[1])+"</div><div class=ms>"+esc(x[2]||"")+"</div></div>"}).join("")+"</div></div>";}
function nearHtml(){var hz=GOALS.horizons||{};return (nearBlk("This week",hz.weekly)+nearBlk("Today",hz.daily))||"<div class=near><span class=sub>—</span></div>"}
function nearBlk(label,items){if(!items||!items.length)return "";var s="<div class=near><div class=gk>"+esc(label)+"</div><ul class=nlist>";for(var i=0;i<items.length;i++)s+="<li"+(items[i].done?" class=ndone":"")+">"+esc(items[i].title)+"</li>";return s+"</ul></div>"}
function rerenderGoals(){var gh=document.getElementById("ghorizons");if(gh)gh.innerHTML=horizonsHtml();var nb=document.getElementById("nearbody");if(nb)nb.innerHTML=nearHtml()}
var saveTimer=null;
function flashSaved(){var s=document.getElementById("savetag");if(!s)return;s.textContent="saving…";s.classList.add("on");}
function saveGoals(){flashSaved();api("goals_save",{tree:GOALS}).then(function(){var s=document.getElementById("savetag");if(s){s.textContent="saved";clearTimeout(saveTimer);saveTimer=setTimeout(function(){s.classList.remove("on")},1200)}}).catch(function(){var s=document.getElementById("savetag");if(s)s.textContent="save failed"})}
function goalOp(act,id){var L=locate(id);if(!L)return;var list=L.list,i=L.i,node=list[i];
if(act==="child"){node.children=node.children||[];node.children.push(newNode())}
else if(act==="up"){if(i>0){list[i]=list[i-1];list[i-1]=node}}
else if(act==="down"){if(i<list.length-1){list[i]=list[i+1];list[i+1]=node}}
else if(act==="del"){list.splice(i,1)}
else if(act==="indent"){if(i>0){var prev=list[i-1];prev.children=prev.children||[];prev.children.push(node);list.splice(i,1)}}
else if(act==="outdent"){if(L.parent){var P=locate(L.parent.id);if(P){list.splice(i,1);P.list.splice(P.i+1,0,node)}}}
rerenderGoals();saveGoals()}
function attachGoalHandlers(){var gh=document.getElementById("ghorizons");if(!gh||gh._bound)return;gh._bound=true;
gh.addEventListener("click",function(e){var t=e.target;
  if(t.classList&&t.classList.contains("gchk")){var L=locate(t.getAttribute("data-id"));if(L){L.list[L.i].done=t.checked;rerenderGoals();saveGoals()}return}
  var btn=t.closest?t.closest("button[data-act]"):null;if(btn){goalOp(btn.getAttribute("data-act"),btn.getAttribute("data-id"));return}
  var add=t.closest?t.closest("button.addtop"):null;if(add){var k=add.getAttribute("data-h");(GOALS.horizons[k]=GOALS.horizons[k]||[]).push(newNode());rerenderGoals();saveGoals();return}
});
gh.addEventListener("focusout",function(e){if(e.target.classList&&e.target.classList.contains("gtext")){var L=locate(e.target.getAttribute("data-id"));if(L){var v=e.target.textContent.trim();if(v!==L.list[L.i].title){L.list[L.i].title=v;var nb=document.getElementById("nearbody");if(nb)nb.innerHTML=nearHtml();saveGoals()}}}});
gh.addEventListener("keydown",function(e){if(e.target.classList&&e.target.classList.contains("gtext")&&e.key==="Enter"){e.preventDefault();e.target.blur()}});}
